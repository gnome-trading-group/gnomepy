[project]
name = "gnomepy"
version = "0.1.6"
description = ""
authors = [
    {name = "mprey",email = "masonprey7@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "requests (>=2.32.3,<3.0.0)",
    "boto3 (>=1.36.18,<2.0.0)",
    "zstandard (>=0.23.0,<0.24.0)",
    "bitstring (>=4.3.0,<5.0.0)",
    "lxml (>=5.3.1,<6.0.0)",
    "numpy (>=2.2.4,<3.0.0)",
    "pytz (>=2025.1,<2026.0)",
    "pandas (>=2.2.3,<3.0.0)",
    "importlib-resources (>=6.5.2,<7.0.0)",
    "PyYAML (>=6.0,<7.0)",
    "pydantic (>=2.0,<3.0)",
]

[project.scripts]
gnome-backtest = "gnomepy.cli.backtest.cli:main"
gnome-train = "gnomepy.cli.train.cli:main"
gnome-explore = "gnomepy.cli.explore.cli:main"

[project.optional-dependencies]
research = ["statsmodels (>=0.14.5,<0.15.0)", "tqdm (>=4.67.3,<5.0.0)"]
lgbm = ["lightgbm (>=4.0.0,<5.0.0)", "scikit-learn (>=1.4.0,<2.0.0)"]
viz = ["matplotlib (>=3.10.1,<4.0.0)", "seaborn (>=0.13.2,<0.14.0)"]
all = [
    "statsmodels (>=0.14.5,<0.15.0)",
    "tqdm (>=4.67.3,<5.0.0)",
    "lightgbm (>=4.0.0,<5.0.0)",
    "scikit-learn (>=1.4.0,<2.0.0)",
    "matplotlib (>=3.10.1,<4.0.0)",
    "seaborn (>=0.13.2,<0.14.0)",
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{include = "gnomepy"}]

[tool.poetry.group.dev.dependencies]
pytest = "^8.4.1"

