# Sweep over network latency to measure execution-latency sensitivity.
# 5 jobs: 0 us, 1 ms, 5 ms, 10 ms, 50 ms round-trip.
# Use this to understand how much alpha erodes as latency increases and to
# set a realistic latency budget for live deployment.

strategy:
  class_name: "gnomepy_research.strategies.momentum:MomentumTaker"
  args:
    exchange_id: 1
    security_id: 1
    size: 100000
    max_position: 5
    threshold_bps: 2.0
    ewma_alpha: 0.95
    warmup_ticks: 100
    stop_loss_bps: 10.0
    take_profit_bps: 15.0
    cooldown_ticks: 50
    processing_time_ns: 500000

start_date: "2026-01-01T00:00:00"
end_date: "2026-01-03T00:00:00"

listings:
  - listing_id: 1
    profile: default

profiles:
  default:
    fee_model:
      type: static
      taker_fee: 0.0005
      maker_fee: 0.0002
    network_latency:
      type: static
      latency_nanos: [0, 1000000, 5000000, 10000000, 50000000]
    order_processing_latency:
      type: static
      latency_nanos: 1000000
    queue_model:
      type: risk_averse
