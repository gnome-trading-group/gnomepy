name: Build & Push Backtest Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'gnomepy/**'
      - 'docker/backtest/**'
      - 'pyproject.toml'
      - 'poetry.lock'
  repository_dispatch:
    types: [gnome-backtest-updated]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      # Check out gnomepy into a subdir so the build context matches
      # the Dockerfile's COPY paths (COPY gnomepy/... and COPY gnome-backtest/...)
      - name: Checkout gnomepy
        uses: actions/checkout@v4
        with:
          path: gnomepy

      - name: Checkout gnome-backtest
        uses: actions/checkout@v4
        with:
          repository: gnome-trading-group/gnome-backtest
          token: ${{ secrets.GH_PAT }}
          path: gnome-backtest

      - name: Build image
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          SHA=$(cd gnomepy && git rev-parse --short HEAD)
          docker build \
            --build-arg GITHUB_ACTOR=${{ github.actor }} \
            --secret id=github_token,env=GITHUB_TOKEN \
            -f gnomepy/docker/backtest/Dockerfile \
            -t gnomepy-backtest:latest \
            -t gnomepy-backtest:$SHA \
            .
          echo "SHA=$SHA" >> $GITHUB_ENV

      - name: Configure AWS credentials (dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - name: Login to ECR (dev)
        id: login-ecr-dev
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to dev ECR
        run: |
          REGISTRY=${{ steps.login-ecr-dev.outputs.registry }}
          docker tag gnomepy-backtest:latest $REGISTRY/gnomepy-backtest:latest
          docker tag gnomepy-backtest:$SHA $REGISTRY/gnomepy-backtest:$SHA
          docker push $REGISTRY/gnomepy-backtest:latest
          docker push $REGISTRY/gnomepy-backtest:$SHA

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - name: Login to ECR (prod)
        id: login-ecr-prod
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to prod ECR
        run: |
          REGISTRY=${{ steps.login-ecr-prod.outputs.registry }}
          docker tag gnomepy-backtest:latest $REGISTRY/gnomepy-backtest:latest
          docker tag gnomepy-backtest:$SHA $REGISTRY/gnomepy-backtest:$SHA
          docker push $REGISTRY/gnomepy-backtest:latest
          docker push $REGISTRY/gnomepy-backtest:$SHA
